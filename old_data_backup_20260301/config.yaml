api:
  debug: false
  host: 0.0.0.0
  port: 8080
frontend:
  auto_open_browser: true
  dev_port: 6001
  prod_port: 6002
logging:
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  level: INFO
ollama:
  model: qwen3-vl:4b
  embedding_model: qwen3-embedding:0.6b
  optimized_model: ""
  options:
    batch_size: 32
    flash_attention: true
    frequency_penalty: 0.1
    gpu_layers: 15
    memory_optimization:
      kv_cache_cpu_ratio: 0.3
      kv_cache_gpu_ratio: 0.7
      mlock: false
      mmap: true
      offload_layers_to_gpu: true
    mirostat: 0
    mirostat_eta: 0.1
    mirostat_tau: 5.0
    num_predict: 256
    num_threads: 8
    penalize_nl: true
    presence_penalty: 0.1
    repeat_last_n: 64
    repeat_penalty: 1.1
    seed: -1
    temperature: 0.1
    tfs_z: 1.0
    top_k: 20
    top_p: 0.9
    typical_p: 1.0
  retry_policy:
    backoff_factor: 1.5
    max_retries: 3
    retry_delay: 2
  timeout: 30
  url: http://localhost:11434
performance:
  batch_size: 10
  max_cache_size: 1000
  timeout: 30
